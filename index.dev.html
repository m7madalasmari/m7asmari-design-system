<div id="root"></div>
<script type="text/babel" data-presets="react">
function css(v) {
  if (v == null) return undefined;
  if (typeof v === 'object') return v;
  const o = {};
  String(v).split(';').forEach((d) => {
    const i = d.indexOf(':'); if (i < 0) return;
    let k = d.slice(0, i).trim(); const val = d.slice(i + 1).trim();
    if (!k) return;
    if (k.startsWith('--')) { o[k] = val; return; }
    k = k.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
    o[k] = val;
  });
  return o;
}

function CodeBlock({ children }) {
  return (<pre className="expcode">{children}</pre>);
}

function ColorScale({ name, varLabel, children }) {
  return (<div className="scalerow"><div className="scalehead"><span className="scalename">{name}</span><span className="scalevar">{varLabel}</span></div>{children}</div>);
}

function ColorSwatch({ copy, chip, name, hex }) {
  return (<div className="swatch" data-copy={copy}><div className="swatch-chip" style={css(chip)}></div><div className="swatch-meta"><div className="swatch-name">{name}</div><div className="swatch-hex">{hex}</div></div></div>);
}

function SectionHeader({ kicker, title, desc }) {
  return (<div className="sectionhead"><div><span className="kicker">{kicker}</span><h2 className="sectitle">{title}</h2></div>{desc ? <p className="secdesc">{desc}</p> : null}</div>);
}

function ShowcasePanel({ children }) {
  return (<div className="panel panel-pad">{children}</div>);
}

function TokenTable({ copy, label, bar }) {
  return (<div className="sparow" data-copy={copy}><span className="spalabel">{label}</span><span className="spabar" style={css(bar)}></span></div>);
}

function TypeSpecimen({ cls, sample, spec }) {
  return (<div className="typerow"><span className={cls}>{sample}</span><span className="typespec">{spec}</span></div>);
}

function Alert({ variant = '', className = '', children, ...rest }) {
  return (<div className={('alert ' + variant + ' ' + className).trim()} {...rest}>{children}</div>);
}

function Avatar({ variant = '', className = '', children, ...rest }) {
  return (<span className={('avatar ' + variant + ' ' + className).trim()} {...rest}>{children}</span>);
}

function Badge({ variant = '', className = '', children, ...rest }) {
  return (<span className={('badge ' + variant + ' ' + className).trim()} {...rest}>{children}</span>);
}

function Banner({ variant = '', className = '', children, ...rest }) {
  return (<div className={('banner ' + variant + ' ' + className).trim()} {...rest}>{children}</div>);
}

function Button({ variant = '', className = '', children, ...rest }) {
  return (<button className={('btn ' + variant + ' ' + className).trim()} {...rest}>{children}</button>);
}

function Card({ variant = '', className = '', children, ...rest }) {
  return (<div className={(variant + ' ' + className).trim()} {...rest}>{children}</div>);
}

function EmptyState({ variant = '', className = '', children, ...rest }) {
  return (<div className={('empty ' + variant + ' ' + className).trim()} {...rest}>{children}</div>);
}

function StatCard({ variant = '', className = '', children, ...rest }) {
  return (<div className={('statcard ' + variant + ' ' + className).trim()} {...rest}>{children}</div>);
}

<div className="dashmain">

</div>
</div>
</div>

}

  }; }
